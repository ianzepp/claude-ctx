name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf claude-ctx-${{ matrix.target }}.tar.gz claude-ctx
          mv claude-ctx-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-ctx-${{ matrix.target }}
          path: claude-ctx-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "aarch64=$(sha256sum claude-ctx-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum claude-ctx-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-ctx-aarch64-apple-darwin.tar.gz
            claude-ctx-x86_64-apple-darwin.tar.gz

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA_AARCH64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X86_64: ${{ steps.sha.outputs.x86_64 }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/ianzepp/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/claude-ctx.rb << EOF
          class ClaudeCtx < Formula
            desc "Inspect Claude Code context window usage for a project"
            homepage "https://github.com/ianzepp/claude-ctx"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ianzepp/claude-ctx/releases/download/${VERSION}/claude-ctx-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64}"
              else
                url "https://github.com/ianzepp/claude-ctx/releases/download/${VERSION}/claude-ctx-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64}"
              end
            end

            def install
              bin.install "claude-ctx"
            end

            test do
              assert_match "claude-ctx", shell_output("#{bin}/claude-ctx --help")
            end
          end
          EOF

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/claude-ctx.rb
          git commit -m "claude-ctx ${VERSION}"
          git push
